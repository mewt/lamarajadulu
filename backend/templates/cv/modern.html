<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @page { size: A4; margin: 16mm 18mm; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #232338;
    font-size: 10.5pt;
    line-height: 1.55;
  }
  .cv h1 {
    font-size: 24pt;
    font-weight: 700;
    color: #4f46e5;
    margin: 0 0 4pt 0;
    letter-spacing: -0.3px;
  }
  .cv h1 + p {
    margin: 0 0 14pt 0;
    color: #6464a0;
    font-size: 9.5pt;
  }
  .cv h2 {
    font-size: 11.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #4f46e5;
    border-left: 3px solid #4f46e5;
    padding-left: 8pt;
    margin: 18pt 0 8pt 0;
  }
  .cv h2:first-of-type { margin-top: 4pt; }
  .cv h3 {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1a1830;
    margin: 10pt 0 2pt 0;
  }
  .cv p { margin: 0 0 6pt 0; }
  .cv ul { margin: 4pt 0 8pt 0; padding-left: 16pt; }
  .cv li { margin-bottom: 3pt; }
  .cv a { color: #4f46e5; text-decoration: none; }
  .cv strong { color: #1a1830; }
</style>
</head>
<body>
  <div class="cv">{{CV_CONTENT}}</div>
</body>
</html>
