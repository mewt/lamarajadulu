<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @page { size: A4; margin: 22mm 24mm; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #2b2b2b;
    font-size: 10pt;
    line-height: 1.7;
  }
  .cv h1 {
    font-size: 20pt;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin: 0 0 4pt 0;
  }
  .cv h1 + p {
    margin: 0 0 18pt 0;
    color: #888;
    font-size: 9pt;
    letter-spacing: 0.02em;
  }
  .cv h2 {
    font-size: 9.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #999;
    margin: 18pt 0 8pt 0;
  }
  .cv h2:first-of-type { margin-top: 0; }
  .cv h3 {
    font-size: 10.5pt;
    font-weight: 600;
    color: #2b2b2b;
    margin: 10pt 0 2pt 0;
  }
  .cv p { margin: 0 0 6pt 0; }
  .cv ul { margin: 4pt 0 8pt 0; padding-left: 14pt; list-style-type: '– '; }
  .cv li { margin-bottom: 4pt; padding-left: 2pt; }
  .cv a { color: #2b2b2b; }
  .cv strong { color: #000; }
</style>
</head>
<body>
  <div class="cv">{{CV_CONTENT}}</div>
</body>
</html>
